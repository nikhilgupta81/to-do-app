<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Dayflow — a premium daily to-do app with dashboard, analytics, and command palette. Find your flow." />
  <meta name="theme-color" content="#6366f1" />
  <title>Dayflow · Find your flow</title>

  <!-- Premium typography: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/css/styles.css" />
</head>
<body>

  <!-- Loading state (perceived-performance polish) -->
  <div id="loader" style="position:fixed;inset:0;display:grid;place-items:center;z-index:500;background:var(--bg)">
    <div style="text-align:center">
      <div style="width:54px;height:54px;border-radius:16px;margin:0 auto 16px;background:var(--gradient-brand);display:grid;place-items:center;color:#fff;box-shadow:0 12px 30px -8px rgba(99,102,241,.7)">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div style="width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--brand-2);border-radius:50%;margin:0 auto" class="spin"></div>
    </div>
  </div>

  <!-- App shell (hidden until first paint) -->
  <div id="app" class="app hide">

    <!-- Mobile scrim -->
    <div id="scrim" class="scrim"></div>

    <!-- ============================ SIDEBAR ============================ -->
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand__logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div>
          <div class="brand__name">Dayflow</div>
          <div class="brand__tag">Find your flow</div>
        </div>
      </div>

      <nav class="nav" aria-label="Primary">
        <span class="nav__label">Workspace</span>
        <button class="nav__item" data-view="today">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          Today <span class="nav__count" id="count-today">0</span>
        </button>
        <button class="nav__item" data-view="all">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11Z"/></svg>
          All tasks <span class="nav__count" id="count-all">0</span>
        </button>
        <button class="nav__item" data-view="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Dashboard
        </button>

        <span class="nav__label">Shortcuts</span>
        <button class="nav__item" id="cmdkBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"/></svg>
          Command palette <span class="nav__count">⌘K</span>
        </button>
      </nav>

      <div class="sidebar__footer">
        <div class="streak-pill">
          <span class="streak-pill__flame">🔥</span>
          <div>
            <div class="streak-pill__num"><span id="streakNum">0</span></div>
            <div class="streak-pill__txt" id="streakTxt">day streak</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ============================ MAIN ============================ -->
    <main class="main">
      <!-- Topbar -->
      <header class="topbar">
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="Open menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar__greeting">
          <h1 class="topbar__hello" id="greeting">Hello</h1>
          <div class="topbar__date" id="todayDate"></div>
        </div>

        <div class="topbar__actions">
          <label class="search" for="searchInput">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input id="searchInput" type="search" placeholder="Search tasks…" aria-label="Search tasks" />
            <kbd>/</kbd>
          </label>

          <div class="has-popover">
            <button class="icon-btn" id="paletteBtn" aria-label="Theme color">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2Z"/></svg>
            </button>
            <div class="popover" id="palettePop"></div>
          </div>

          <button class="icon-btn" id="themeBtn" aria-label="Toggle theme"><span id="themeIcon"></span></button>

          <button class="btn btn--primary" id="addBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span class="topbar__add-label">New task</span>
          </button>
        </div>
      </header>

      <!-- ========== VIEW: TASKS (today / all) ========== -->
      <section class="view" data-viewpane="tasks">
        <div id="stats" class="stats-grid"></div>
        <div id="progress" class="card" style="margin-bottom:8px"></div>

        <div class="section-head">
          <h2 id="listTitle">Today</h2>
          <span class="muted">Drag to reorder</span>
          <button class="btn btn--ghost" id="clearBtn" style="margin-left:auto;padding:8px 14px">Clear completed</button>
        </div>

        <div id="filters" class="chips"></div>
        <ul id="taskList" class="tasks" aria-live="polite"></ul>
      </section>

      <!-- ========== VIEW: DASHBOARD ========== -->
      <section class="view" data-viewpane="dashboard">
        <div id="dashboard"></div>
      </section>
    </main>
  </div>

  <!-- ============================ TASK MODAL ============================ -->
  <div class="overlay" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <form class="modal" id="taskForm">
      <div class="modal__head">
        <div class="modal__title" id="modalTitle">New task</div>
        <button class="icon-btn" type="button" id="modalClose" aria-label="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div class="field">
        <label class="field__label" for="f-title">Task</label>
        <input class="input" id="f-title" placeholder="e.g. Finalize Q3 roadmap" autocomplete="off" required />
      </div>

      <div class="field">
        <label class="field__label" for="f-notes">Notes <span style="color:var(--text-3);font-weight:500">(optional)</span></label>
        <textarea class="textarea" id="f-notes" placeholder="Add details…"></textarea>
      </div>

      <div class="field">
        <label class="field__label">Priority</label>
        <div class="seg" id="prioritySeg">
          <button type="button" class="seg__opt" data-p="low">Low</button>
          <button type="button" class="seg__opt" data-p="medium">Medium</button>
          <button type="button" class="seg__opt" data-p="high">High</button>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field__label" for="f-category">Category</label>
          <select class="select" id="f-category">
            <option>Work</option><option>Personal</option><option>Health</option><option>Learning</option><option>Errands</option>
          </select>
        </div>
        <div class="field">
          <label class="field__label" for="f-due">Due date</label>
          <input class="input" id="f-due" type="date" />
        </div>
      </div>

      <div class="modal__foot">
        <button type="button" class="btn btn--ghost" id="modalCancel">Cancel</button>
        <button type="submit" class="btn btn--primary">Save task</button>
      </div>
    </form>
  </div>

  <!-- ============================ CONFIRM MODAL ============================ -->
  <div class="overlay" id="confirmModal" role="alertdialog" aria-modal="true" aria-labelledby="confirmMsg">
    <div class="modal confirm">
      <div class="confirm__icon">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </div>
      <div class="modal__title" style="font-size:var(--fs-md)">Are you sure?</div>
      <p id="confirmMsg">This action cannot be undone.</p>
      <div class="modal__foot" style="justify-content:center;margin-top:20px">
        <button class="btn btn--ghost" id="confirmCancel">Cancel</button>
        <button class="btn btn--danger" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <!-- ============================ COMMAND PALETTE ============================ -->
  <div class="cmdk" id="cmdk" role="dialog" aria-modal="true" aria-label="Command palette">
    <div class="cmdk__box">
      <div class="cmdk__input-row">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3)"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="cmdk__input" id="cmdkInput" placeholder="Type a command or search…" autocomplete="off" />
        <kbd>ESC</kbd>
      </div>
      <div class="cmdk__list" id="cmdkList"></div>
    </div>
  </div>

  <!-- ============================ TOASTS ============================ -->
  <div class="toasts" id="toasts" aria-live="polite" aria-atomic="true"></div>

  <!-- Scripts: load order matters (utils → icons → store → app) -->
  <script src="src/js/utils.js"></script>
  <script src="src/js/icons.js"></script>
  <script src="src/js/store.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
